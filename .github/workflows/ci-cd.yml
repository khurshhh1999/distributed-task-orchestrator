name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'
  DATABASE_USERNAME: orchestrator
  DATABASE_PASSWORD: orchestrator

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: task_orchestrator
          POSTGRES_USER: ${{ env.DATABASE_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build common module
        run: mvn -B -pl common clean install -DskipTests

      - name: Run unit tests
        run: mvn -B test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/task_orchestrator
          DATABASE_USERNAME: ${{ env.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore

      - name: Package applications
        run: mvn -B package -DskipTests

      - name: Upload task-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-api-jar
          path: task-api/target/task-api-*.jar

      - name: Upload task-worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-worker-jar
          path: task-worker/target/task-worker-*.jar

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Start infrastructure
        run: docker compose up -d postgres redis zookeeper kafka

      - name: Wait for Kafka
        run: |
          for i in {1..30}; do
            docker compose exec -T kafka kafka-broker-api-versions --bootstrap-server localhost:9092 && break
            sleep 5
          done

      - name: Build and start services
        run: |
          mvn -B package -DskipTests
          docker compose up -d --build task-api task-worker

      - name: Wait for task-api health
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 5
          done

      - name: Submit test task
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/v1/tasks \
            -H "Content-Type: application/json" \
            -H "Idempotency-Key: ci-test-$(date +%s)" \
            -d '{"taskType":"EMAIL_NOTIFICATION","payload":"ci-integration-test","metadata":{"source":"github-actions"}}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "QUEUED"

      - name: Verify metrics endpoint
        run: curl -sf http://localhost:8080/actuator/prometheus | grep -q "tasks_submitted_total"

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-publish:
    runs-on: ubuntu-latest
    needs: integration-test
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push task-api image
        if: env.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: task-api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/task-orchestrator-api:latest
            ${{ env.DOCKER_USERNAME }}/task-orchestrator-api:${{ github.sha }}

      - name: Build and push task-worker image
        if: env.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: task-worker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/task-orchestrator-worker:latest
            ${{ env.DOCKER_USERNAME }}/task-orchestrator-worker:${{ github.sha }}

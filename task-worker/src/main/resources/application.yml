spring:
  application:
    name: task-worker
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/task_orchestrator}
    username: ${DATABASE_USERNAME:orchestrator}
    password: ${DATABASE_PASSWORD:orchestrator}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:task-worker-group}

orchestrator:
  retry-sweeper:
    # How often the sweeper scans for stranded retries.
    interval-ms: ${RETRY_SWEEPER_INTERVAL_MS:15000}
    # Delay before the first scan, giving the app time to fully start.
    initial-delay-ms: ${RETRY_SWEEPER_INITIAL_DELAY_MS:20000}
    # Only recover retries overdue by at least this long, so the sweeper does
    # not race with the live Kafka retry path.
    stale-threshold-ms: ${RETRY_SWEEPER_STALE_THRESHOLD_MS:30000}
    # Max tasks reclaimed per scan.
    batch-size: ${RETRY_SWEEPER_BATCH_SIZE:100}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[tasks.execution.duration]": true
        "[http.server.requests]": true

logging:
  level:
    com.orchestrator: INFO

global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: task-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["task-api:8080"]
        labels:
          service: task-api

  - job_name: task-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["task-worker:8081"]
        labels:
          service: task-worker

groups:
  - name: task-orchestrator
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} target is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} ({{ $labels.job }})."

      - alert: DeadLetterGrowth
        expr: sum(increase(tasks_processed_dlq_total[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Tasks are being dead-lettered"
          description: "More than 5 tasks moved to the DLQ in the last 5 minutes; investigate task failures."

      - alert: RetryRecoverySpike
        expr: sum(increase(tasks_retry_recovered_total[5m])) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Retry sweeper is recovering many stuck tasks"
          description: "The sweeper reclaimed >10 stranded retries in 5m, suggesting the Kafka retry path is unhealthy."

      - alert: HighExecutionLatencyP95
        expr: histogram_quantile(0.95, sum(rate(tasks_execution_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Task execution p95 latency is high"
          description: "p95 task execution latency has exceeded 1s for 5 minutes."
